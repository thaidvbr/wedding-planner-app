<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slider">

<nav class="menu">
  <h2 class="logo">Plano Perfeito – Do sonho ao altar</h2>

  <div class="links">
    <a href="index.html">Início</a>
    <a href="#">Lista</a>
    <a href="#">Planejamento</a>
    <a href="#">Dicas</a>
    <a href="login.html" class="login">LOGIN</a>
  </div>
</nav>

<section class="login-area">

  <h2 class="titulo-login">LOGIN</h2>
  <h3>Acesse sua conta</h3>

  <div class="card-login">

    <button class="google-btn">
      <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
      Fazer login com Google
    </button>

    <p class="ou">ou</p>

    <label>E-mail *</label>
    <input type="email" id="email" placeholder="seu@email.com">

    <label>Senha *</label>
    <input type="password" id="senha" placeholder="Sua senha de acesso">

    <p id="erro-login" class="erro-login"></p>

    <a href="#" class="esqueci">Esqueceu sua senha?</a>

    <button class="entrar" onclick="login()">ENTRAR</button>

    <p class="cadastro">
      Não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
    </p>

  </div>

</section>

<script src="script.js"></script>

</body>
</html>
